<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrono 15 min</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #ff3333;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff1a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,51,51,0.05) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.5s;
  }
  .bg-glow.danger { background: radial-gradient(circle, rgba(255,26,26,0.1) 0%, transparent 70%); }

  .intro-text { text-align: center; max-width: 560px; }
  .intro-text p:first-child {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5.5vw, 3.2rem);
    letter-spacing: 0.06em;
    line-height: 1.15;
    color: rgba(232,255,71,0.75);
  }
  .intro-text .ready {
    margin-top: 0.6rem;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(7rem, 22vw, 14rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--accent);
    text-shadow: 0 0 80px rgba(255,51,51,0.25);
    user-select: none;
    transition: color 0.5s;
  }
  .timer-display.danger {
    color: var(--danger);
    text-shadow: 0 0 80px rgba(255,26,26,0.4);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

  .progress-bar {
    width: min(520px, 90vw);
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s linear, background 0.5s;
    width: 100%;
  }
  .progress-fill.danger { background: var(--danger); }

  .finished-msg {
    display: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    color: var(--accent);
    letter-spacing: 0.05em;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .finished-msg.show { display: block; }

  #menuTrigger {
    position: fixed;
    top: 50%; right: 0;
    transform: translateY(-50%);
    width: 28px; height: 72px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-right: none;
    border-radius: 8px 0 0 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: background 0.2s;
  }
  #menuTrigger:hover { background: rgba(255,255,255,0.1); }
  #menuTrigger svg { opacity: 0.35; transition: opacity 0.2s; }
  #menuTrigger:hover svg { opacity: 0.7; }

  #sidePanel {
    position: fixed;
    top: 0; right: -320px;
    width: 300px; height: 100vh;
    background: var(--surface);
    border-left: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
    z-index: 60;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #sidePanel.open { right: 0; }

  #sidePanel .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  #sidePanel .panel-sub {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .code-inputs { display: flex; gap: 0.5rem; }
  .code-inputs input {
    width: 38px; height: 50px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: var(--accent);
    outline: none;
    transition: border-color 0.2s;
    caret-color: transparent;
  }
  .code-inputs input:focus { border-color: rgba(255,51,51,0.6); }
  .code-inputs input.error { border-color: var(--danger); animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  #codeError {
    font-size: 0.75rem;
    color: var(--danger);
    min-height: 1em;
    letter-spacing: 0.05em;
    text-align: center;
  }

  #adminControls { display: none; flex-direction: column; gap: 0.8rem; width: 100%; }

  .panel-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--text);
    padding: 0.7rem 1.2rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .panel-btn:hover { background: rgba(255,255,255,0.06); }
  .panel-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .panel-btn.primary:hover { background: #e62e2e; }

  #closePanelBtn {
    position: absolute;
    top: 1.2rem; left: 1.2rem;
    background: none; border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem;
    transition: color 0.2s;
  }
  #closePanelBtn:hover { color: var(--text); }

  #backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 55;
  }
  #backdrop.show { display: block; }

  .status-line {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.connected { background: #4caf50; }
</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>

<div class="intro-text">
  <p>Vous allez avoir 15mn pour revenir habillé ici du mieux possible !</p>
  <p class="ready">Êtes-vous prêt ?</p>
</div>

<span class="label">Chronomètre</span>
<div class="timer-display" id="timerDisplay">15:00</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="finished-msg" id="finishedMsg">Temps écoulé !</div>

<div id="menuTrigger" onclick="openPanel()">
  <svg width="10" height="20" viewBox="0 0 10 20" fill="none">
    <path d="M7 4L3 10L7 16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>

<div id="backdrop" onclick="closePanel()"></div>

<div id="sidePanel">
  <button id="closePanelBtn" onclick="closePanel()">✕</button>

  <div id="codeSection">
    <div class="panel-title">Admin</div>
    <p class="panel-sub">Code à 6 chiffres</p>
    <div class="code-inputs">
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
    </div>
    <div id="codeError"></div>
  </div>

  <div id="adminControls">
    <div class="panel-title">Contrôles</div>
    <div class="status-line">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connexion...</span>
    </div>
    <button class="panel-btn primary" id="btnStart" onclick="adminToggle()">Démarrer</button>
    <button class="panel-btn" onclick="adminReset()">Réinitialiser</button>
  </div>
</div>

<script>
  const SECRET   = "280598";
  const TOTAL    = 15 * 60;
  const ABLY_KEY = "c-eHOA.mMcxTw:g1nbSAwqH5O8Br2XdMSv_lxMKczENG7SLs4bLKYfJ4o";

  let localInterval = null;
  let isAdmin       = false;
  let startTs       = null;
  let paused        = false;
  let pausedRem     = null;
  let ablyChannel   = null;

  const display       = document.getElementById('timerDisplay');
  const fill          = document.getElementById('progressFill');
  const btn           = document.getElementById('btnStart');
  const glow          = document.getElementById('bgGlow');
  const msg           = document.getElementById('finishedMsg');
  const panel         = document.getElementById('sidePanel');
  const backdrop      = document.getElementById('backdrop');
  const errorEl       = document.getElementById('codeError');
  const codeSection   = document.getElementById('codeSection');
  const adminControls = document.getElementById('adminControls');
  const inputs        = document.querySelectorAll('.code-inputs input');
  const statusDot     = document.getElementById('statusDot');
  const statusText    = document.getElementById('statusText');

  // ── Ably setup ────────────────────────────────────────────────
  const ably = new Ably.Realtime({ key: ABLY_KEY });

  ably.connection.on('connected', () => {
    statusDot.classList.add('connected');
    statusText.textContent = 'Connecté';
  });
  ably.connection.on('disconnected', () => {
    statusDot.classList.remove('connected');
    statusText.textContent = 'Déconnecté';
  });
  ably.connection.on('failed', () => {
    statusText.textContent = 'Erreur connexion';
  });

  ablyChannel = ably.channels.get('chrono-channel');

  // Écouter les événements timer
  ablyChannel.subscribe('timer', (message) => {
    handleTimerEvent(message.data);
  });

  // Récupérer le dernier état au chargement (history)
  ablyChannel.history({ limit: 1 }, (err, page) => {
    if (!err && page.items.length > 0) {
      const last = page.items[0];
      if (last.name === 'timer') handleTimerEvent(last.data);
    }
  });

  function handleTimerEvent(data) {
    if (data.action === 'start') {
      startTs   = data.startTs;
      paused    = false;
      pausedRem = null;
      msg.classList.remove('show');
      startLocalLoop();
      if (isAdmin) btn.textContent = 'Pause';
    } else if (data.action === 'pause') {
      pausedRem = data.remaining;
      paused    = true;
      startTs   = null;
      clearInterval(localInterval);
      updateUI(pausedRem);
      if (isAdmin) btn.textContent = 'Reprendre';
    } else if (data.action === 'reset') {
      startTs   = null;
      paused    = false;
      pausedRem = null;
      clearInterval(localInterval);
      updateUI(TOTAL);
      msg.classList.remove('show');
      if (isAdmin) btn.textContent = 'Démarrer';
    }
  }

  function sendEvent(data) {
    ablyChannel.publish('timer', data);
  }

  // ── Timer ─────────────────────────────────────────────────────
  function fmt(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function updateUI(remaining) {
    display.textContent = fmt(remaining);
    fill.style.width = (remaining / TOTAL * 100) + '%';
    const isDanger = remaining <= 60 && remaining > 0;
    display.classList.toggle('danger', isDanger);
    fill.classList.toggle('danger', isDanger);
    glow.classList.toggle('danger', isDanger);
    if (remaining <= 0) {
      clearInterval(localInterval);
      msg.classList.add('show');
      navigator.vibrate && navigator.vibrate([300,100,300]);
    }
  }

  function startLocalLoop() {
    clearInterval(localInterval);
    localInterval = setInterval(() => {
      if (!startTs) return;
      const elapsed = Math.floor((Date.now() - startTs) / 1000);
      const rem = Math.max(0, TOTAL - elapsed);
      updateUI(rem);
      if (rem <= 0) clearInterval(localInterval);
    }, 500);
  }

  // ── Admin ─────────────────────────────────────────────────────
  function adminToggle() {
    if (paused) {
      const newTs = Date.now() - (TOTAL - pausedRem) * 1000;
      sendEvent({ action: 'start', startTs: newTs });
    } else if (startTs) {
      const elapsed = Math.floor((Date.now() - startTs) / 1000);
      const rem = Math.max(0, TOTAL - elapsed);
      sendEvent({ action: 'pause', remaining: rem });
    } else {
      sendEvent({ action: 'start', startTs: Date.now() });
    }
  }

  function adminReset() {
    sendEvent({ action: 'reset' });
  }

  // ── Panel ─────────────────────────────────────────────────────
  function openPanel() {
    panel.classList.add('open');
    backdrop.classList.add('show');
    if (!isAdmin) setTimeout(() => inputs[0].focus(), 350);
  }
  function closePanel() {
    panel.classList.remove('open');
    backdrop.classList.remove('show');
  }

  inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g,'').slice(-1);
      if (input.value && i < inputs.length - 1) inputs[i+1].focus();
      if ([...inputs].every(inp => inp.value.length === 1)) checkCode();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !input.value && i > 0) inputs[i-1].focus();
    });
  });

  function checkCode() {
    const entered = [...inputs].map(i => i.value).join('');
    if (entered === SECRET) {
      isAdmin = true;
      codeSection.style.display = 'none';
      adminControls.style.display = 'flex';
    } else {
      errorEl.textContent = 'Code incorrect';
      inputs.forEach(inp => { inp.classList.add('error'); inp.value = ''; });
      setTimeout(() => {
        inputs.forEach(inp => inp.classList.remove('error'));
        errorEl.textContent = '';
        inputs[0].focus();
      }, 800);
    }
  }

  updateUI(TOTAL);
</script>
</body>
</html>
