<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrono 15 min</title>
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #ff3333;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff1a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,51,51,0.05) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.5s;
  }
  .bg-glow.danger {
    background: radial-gradient(circle, rgba(255,26,26,0.1) 0%, transparent 70%);
  }

  .intro-text { text-align: center; max-width: 560px; }
  .intro-text p:first-child {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5.5vw, 3.2rem);
    letter-spacing: 0.06em;
    line-height: 1.15;
    color: rgba(232,255,71,0.75);
  }
  .intro-text .ready {
    margin-top: 0.6rem;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(7rem, 22vw, 14rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--accent);
    text-shadow: 0 0 80px rgba(255,51,51,0.25);
    user-select: none;
    transition: color 0.5s;
  }
  .timer-display.danger {
    color: var(--danger);
    text-shadow: 0 0 80px rgba(255,26,26,0.4);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

  .progress-bar {
    width: min(520px, 90vw);
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s linear, background 0.5s;
    width: 100%;
  }
  .progress-fill.danger { background: var(--danger); }

  .finished-msg {
    display: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    color: var(--accent);
    letter-spacing: 0.05em;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .finished-msg.show { display: block; }

  #menuTrigger {
    position: fixed;
    top: 50%; right: 0;
    transform: translateY(-50%);
    width: 28px; height: 72px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-right: none;
    border-radius: 8px 0 0 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: background 0.2s;
  }
  #menuTrigger:hover { background: rgba(255,255,255,0.1); }
  #menuTrigger svg { opacity: 0.35; transition: opacity 0.2s; }
  #menuTrigger:hover svg { opacity: 0.7; }

  #sidePanel {
    position: fixed;
    top: 0; right: -320px;
    width: 300px; height: 100vh;
    background: var(--surface);
    border-left: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
    z-index: 60;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #sidePanel.open { right: 0; }

  #sidePanel .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  #sidePanel .panel-sub {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .code-inputs { display: flex; gap: 0.5rem; }
  .code-inputs input {
    width: 38px; height: 50px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: var(--accent);
    outline: none;
    transition: border-color 0.2s;
    caret-color: transparent;
  }
  .code-inputs input:focus { border-color: rgba(255,51,51,0.6); }
  .code-inputs input.error { border-color: var(--danger); animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  #codeError {
    font-size: 0.75rem;
    color: var(--danger);
    min-height: 1em;
    letter-spacing: 0.05em;
    text-align: center;
  }

  #adminControls { display: none; flex-direction: column; gap: 0.8rem; width: 100%; }

  .panel-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--text);
    padding: 0.7rem 1.2rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .panel-btn:hover { background: rgba(255,255,255,0.06); }
  .panel-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .panel-btn.primary:hover { background: #e62e2e; }

  #closePanelBtn {
    position: absolute;
    top: 1.2rem; left: 1.2rem;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem;
    transition: color 0.2s;
  }
  #closePanelBtn:hover { color: var(--text); }

  #backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 55;
  }
  #backdrop.show { display: block; }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #4caf50; }
  .status-line {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: flex;
    align-items: center;
  }
</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>

<div class="intro-text">
  <p>Vous allez avoir 15mn pour revenir habillé ici du mieux possible !</p>
  <p class="ready">Êtes-vous prêt ?</p>
</div>

<span class="label">Chronomètre</span>
<div class="timer-display" id="timerDisplay">15:00</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="finished-msg" id="finishedMsg">Temps écoulé !</div>

<div id="menuTrigger" onclick="openPanel()">
  <svg width="10" height="20" viewBox="0 0 10 20" fill="none">
    <path d="M7 4L3 10L7 16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>

<div id="backdrop" onclick="closePanel()"></div>

<div id="sidePanel">
  <button id="closePanelBtn" onclick="closePanel()">✕</button>

  <div id="codeSection">
    <div class="panel-title">Admin</div>
    <p class="panel-sub">Code à 6 chiffres</p>
    <div class="code-inputs">
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
      <input type="tel" maxlength="1" />
    </div>
    <div id="codeError"></div>
  </div>

  <div id="adminControls">
    <div class="panel-title">Contrôles</div>
    <div class="status-line"><span class="status-dot" id="statusDot"></span><span id="statusText">Connexion...</span></div>
    <button class="panel-btn primary" id="btnStart" onclick="adminToggle()">Démarrer</button>
    <button class="panel-btn" onclick="adminReset()">Réinitialiser</button>
  </div>
</div>

<script>
  const SECRET  = "280598";
  const TOTAL   = 15 * 60;
  const PUSHER_KEY     = "9a22598565bd4c97290f";
  const PUSHER_CLUSTER = "eu";
  // ⚠️ Pour envoyer des événements depuis le navigateur, on utilise
  // le mode client-events sur un channel de présence ou on passe par
  // une petite API. Ici on utilise l'API REST Pusher via un proxy CORS gratuit.
  const APP_ID  = "2143392";
  const SECRET_KEY = "72feb77fa21aa0412a93";
  const CHANNEL = "chrono-channel";
  const EVENT   = "timer-event";

  let localInterval = null;
  let isAdmin = false;
  let startTs = null;   // timestamp de départ (ms)
  let paused  = false;
  let pausedRem = null; // secondes restantes au moment du pause

  const display       = document.getElementById('timerDisplay');
  const fill          = document.getElementById('progressFill');
  const btn           = document.getElementById('btnStart');
  const glow          = document.getElementById('bgGlow');
  const msg           = document.getElementById('finishedMsg');
  const panel         = document.getElementById('sidePanel');
  const backdrop      = document.getElementById('backdrop');
  const errorEl       = document.getElementById('codeError');
  const codeSection   = document.getElementById('codeSection');
  const adminControls = document.getElementById('adminControls');
  const inputs        = document.querySelectorAll('.code-inputs input');
  const statusDot     = document.getElementById('statusDot');
  const statusText    = document.getElementById('statusText');

  // ── Pusher setup ─────────────────────────────────────────────
  const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
  const channel = pusher.subscribe(CHANNEL);

  pusher.connection.bind('connected', () => {
    statusDot.classList.add('connected');
    statusText.textContent = 'Connecté';
  });
  pusher.connection.bind('disconnected', () => {
    statusDot.classList.remove('connected');
    statusText.textContent = 'Déconnecté';
  });

  // Receive events from Pusher
  channel.bind(EVENT, (data) => {
    if (data.action === 'start') {
      startTs    = data.startTs;
      paused     = false;
      pausedRem  = null;
      startLocalLoop();
      if (isAdmin) btn.textContent = 'Pause';
    } else if (data.action === 'pause') {
      pausedRem = data.remaining;
      paused    = true;
      startTs   = null;
      clearInterval(localInterval);
      updateUI(pausedRem);
      if (isAdmin) btn.textContent = 'Reprendre';
    } else if (data.action === 'reset') {
      startTs   = null;
      paused    = false;
      pausedRem = null;
      clearInterval(localInterval);
      updateUI(TOTAL);
      msg.classList.remove('show');
      if (isAdmin) btn.textContent = 'Démarrer';
    }
  });

  // ── Send event via Pusher REST API (through allorigins CORS proxy) ──
  async function pusherTrigger(action, extra = {}) {
    const body = JSON.stringify({ action, ...extra });
    const ts   = Math.floor(Date.now() / 1000);
    const authStr = `POST\n/apps/${APP_ID}/events\n` +
      `auth_key=${PUSHER_KEY}&auth_timestamp=${ts}&auth_version=1.0&` +
      `body_md5=${await md5(body)}&channel=${CHANNEL}&name=${EVENT}`;

    const signature = await hmacSha256(SECRET_KEY, authStr);

    const url = `https://api-${PUSHER_CLUSTER}.pusher.com/apps/${APP_ID}/events?` +
      `auth_key=${PUSHER_KEY}&auth_timestamp=${ts}&auth_version=1.0&` +
      `body_md5=${await md5(body)}&channel=${CHANNEL}&name=${EVENT}&auth_signature=${signature}`;

    try {
      await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body
      });
    } catch(e) {
      console.error('Pusher trigger error', e);
    }
  }

  // ── Crypto helpers ───────────────────────────────────────────
  async function hmacSha256(key, data) {
    const enc = new TextEncoder();
    const k = await crypto.subtle.importKey('raw', enc.encode(key),
      { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', k, enc.encode(data));
    return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function md5(str) {
    // Simple MD5 via SubtleCrypto not available — use a lightweight impl
    return md5impl(str);
  }

  // Lightweight MD5
  function md5impl(s) {
    function safeAdd(x, y) { const lsw=(x&0xFFFF)+(y&0xFFFF); return (((x>>16)+(y>>16)+(lsw>>16))<<16)|(lsw&0xFFFF); }
    function bitRotateLeft(num, cnt) { return (num<<cnt)|(num>>>(32-cnt)); }
    function md5cmn(q,a,b,x,s,t){return safeAdd(bitRotateLeft(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
    function md5ff(a,b,c,d,x,s,t){return md5cmn((b&c)|((~b)&d),a,b,x,s,t);}
    function md5gg(a,b,c,d,x,s,t){return md5cmn((b&d)|(c&(~d)),a,b,x,s,t);}
    function md5hh(a,b,c,d,x,s,t){return md5cmn(b^c^d,a,b,x,s,t);}
    function md5ii(a,b,c,d,x,s,t){return md5cmn(c^(b|(~d)),a,b,x,s,t);}
    const ucs2decode = str => { const out=[]; for(let i=0;i<str.length;i++){let v=str.charCodeAt(i);if(v>=0xD800&&v<=0xDBFF&&i+1<str.length){const e=str.charCodeAt(i+1);if(e>=0xDC00&&e<=0xDFFF){v=0x10000+((v-0xD800)<<10)+(e-0xDC00);i++;}}out.push(v);}return out;};
    function encUtf8(s){return unescape(encodeURIComponent(s));}
    function strToU32(str){const buf=new Uint8Array(str.length);for(let i=0;i<str.length;i++)buf[i]=str.charCodeAt(i);const arr=new Int32Array(buf.buffer);return arr;}
    const str8 = encUtf8(s);
    const len8 = str8.length;
    const M = [];
    for(let i=0;i<len8;i++){if(!M[i>>2])M[i>>2]=0;M[i>>2]|=str8.charCodeAt(i)<<((i%4)*8);}
    if(!M[len8>>2])M[len8>>2]=0;
    M[len8>>2]|=0x80<<((len8%4)*8);
    M[(((len8+64)>>>9)<<4)+14]=len8*8;
    let a=1732584193,b=-271733879,c=-1732584194,d=271733878;
    for(let i=0;i<M.length;i+=16){
      const oA=a,oB=b,oC=c,oD=d;
      a=md5ff(a,b,c,d,M[i],7,-680876936);d=md5ff(d,a,b,c,M[i+1],12,-389564586);c=md5ff(c,d,a,b,M[i+2],17,606105819);b=md5ff(b,c,d,a,M[i+3],22,-1044525330);
      a=md5ff(a,b,c,d,M[i+4],7,-176418897);d=md5ff(d,a,b,c,M[i+5],12,1200080426);c=md5ff(c,d,a,b,M[i+6],17,-1473231341);b=md5ff(b,c,d,a,M[i+7],22,-45705983);
      a=md5ff(a,b,c,d,M[i+8],7,1770035416);d=md5ff(d,a,b,c,M[i+9],12,-1958414417);c=md5ff(c,d,a,b,M[i+10],17,-42063);b=md5ff(b,c,d,a,M[i+11],22,-1990404162);
      a=md5ff(a,b,c,d,M[i+12],7,1804603682);d=md5ff(d,a,b,c,M[i+13],12,-40341101);c=md5ff(c,d,a,b,M[i+14],17,-1502002290);b=md5ff(b,c,d,a,M[i+15],22,1236535329);
      a=md5gg(a,b,c,d,M[i+1],5,-165796510);d=md5gg(d,a,b,c,M[i+6],9,-1069501632);c=md5gg(c,d,a,b,M[i+11],14,643717713);b=md5gg(b,c,d,a,M[i],20,-373897302);
      a=md5gg(a,b,c,d,M[i+5],5,-701558691);d=md5gg(d,a,b,c,M[i+10],9,38016083);c=md5gg(c,d,a,b,M[i+15],14,-660478335);b=md5gg(b,c,d,a,M[i+4],20,-405537848);
      a=md5gg(a,b,c,d,M[i+9],5,568446438);d=md5gg(d,a,b,c,M[i+14],9,-1019803690);c=md5gg(c,d,a,b,M[i+3],14,-187363961);b=md5gg(b,c,d,a,M[i+8],20,1163531501);
      a=md5gg(a,b,c,d,M[i+13],5,-1444681467);d=md5gg(d,a,b,c,M[i+2],9,-51403784);c=md5gg(c,d,a,b,M[i+7],14,1735328473);b=md5gg(b,c,d,a,M[i+12],20,-1926607734);
      a=md5hh(a,b,c,d,M[i+5],4,-378558);d=md5hh(d,a,b,c,M[i+8],11,-2022574463);c=md5hh(c,d,a,b,M[i+11],16,1839030562);b=md5hh(b,c,d,a,M[i+14],23,-35309556);
      a=md5hh(a,b,c,d,M[i+1],4,-1530992060);d=md5hh(d,a,b,c,M[i+4],11,1272893353);c=md5hh(c,d,a,b,M[i+7],16,-155497632);b=md5hh(b,c,d,a,M[i+10],23,-1094730640);
      a=md5hh(a,b,c,d,M[i+13],4,681279174);d=md5hh(d,a,b,c,M[i],11,-358537222);c=md5hh(c,d,a,b,M[i+3],16,-722521979);b=md5hh(b,c,d,a,M[i+6],23,76029189);
      a=md5hh(a,b,c,d,M[i+9],4,-640364487);d=md5hh(d,a,b,c,M[i+12],11,-421815835);c=md5hh(c,d,a,b,M[i+15],16,530742520);b=md5hh(b,c,d,a,M[i+2],23,-995338651);
      a=md5ii(a,b,c,d,M[i],6,-198630844);d=md5ii(d,a,b,c,M[i+7],10,1126891415);c=md5ii(c,d,a,b,M[i+14],15,-1416354905);b=md5ii(b,c,d,a,M[i+5],21,-57434055);
      a=md5ii(a,b,c,d,M[i+12],6,1700485571);d=md5ii(d,a,b,c,M[i+3],10,-1894986606);c=md5ii(c,d,a,b,M[i+10],15,-1051523);b=md5ii(b,c,d,a,M[i+1],21,-2054922799);
      a=md5ii(a,b,c,d,M[i+8],6,1873313359);d=md5ii(d,a,b,c,M[i+15],10,-30611744);c=md5ii(c,d,a,b,M[i+6],15,-1560198380);b=md5ii(b,c,d,a,M[i+13],21,1309151649);
      a=md5ii(a,b,c,d,M[i+4],6,-145523070);d=md5ii(d,a,b,c,M[i+11],10,-1120210379);c=md5ii(c,d,a,b,M[i+2],15,718787259);b=md5ii(b,c,d,a,M[i+9],21,-343485551);
      a=safeAdd(a,oA);b=safeAdd(b,oB);c=safeAdd(c,oC);d=safeAdd(d,oD);
    }
    return [a,b,c,d].map(n=>(n<0?n+0x100000000:n).toString(16).padStart(8,'0').match(/.{2}/g).reverse().join('')).join('');
  }

  // ── Timer logic ───────────────────────────────────────────────
  function fmt(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function updateUI(remaining) {
    display.textContent = fmt(remaining);
    fill.style.width = (remaining / TOTAL * 100) + '%';
    const isDanger = remaining <= 60 && remaining > 0;
    display.classList.toggle('danger', isDanger);
    fill.classList.toggle('danger', isDanger);
    glow.classList.toggle('danger', isDanger);
    if (remaining <= 0) {
      msg.classList.add('show');
      clearInterval(localInterval);
      navigator.vibrate && navigator.vibrate([300,100,300]);
    }
  }

  function startLocalLoop() {
    clearInterval(localInterval);
    localInterval = setInterval(() => {
      if (!startTs) return;
      const elapsed = Math.floor((Date.now() - startTs) / 1000);
      const rem = Math.max(0, TOTAL - elapsed);
      updateUI(rem);
      if (rem <= 0) clearInterval(localInterval);
    }, 500);
  }

  // ── Admin actions ─────────────────────────────────────────────
  async function adminToggle() {
    if (paused) {
      // Resume
      const newTs = Date.now() - (TOTAL - pausedRem) * 1000;
      await pusherTrigger('start', { startTs: newTs });
    } else if (startTs) {
      // Pause
      const elapsed = Math.floor((Date.now() - startTs) / 1000);
      const rem = Math.max(0, TOTAL - elapsed);
      await pusherTrigger('pause', { remaining: rem });
    } else {
      // Fresh start
      await pusherTrigger('start', { startTs: Date.now() });
    }
  }

  async function adminReset() {
    await pusherTrigger('reset');
  }

  // ── Panel ─────────────────────────────────────────────────────
  function openPanel() {
    panel.classList.add('open');
    backdrop.classList.add('show');
    if (!isAdmin) setTimeout(() => inputs[0].focus(), 350);
  }
  function closePanel() {
    panel.classList.remove('open');
    backdrop.classList.remove('show');
  }

  inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g,'').slice(-1);
      if (input.value && i < inputs.length - 1) inputs[i+1].focus();
      if ([...inputs].every(inp => inp.value.length === 1)) checkCode();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !input.value && i > 0) inputs[i-1].focus();
    });
  });

  function checkCode() {
    const entered = [...inputs].map(i => i.value).join('');
    if (entered === SECRET) {
      isAdmin = true;
      codeSection.style.display = 'none';
      adminControls.style.display = 'flex';
    } else {
      errorEl.textContent = 'Code incorrect';
      inputs.forEach(inp => { inp.classList.add('error'); inp.value = ''; });
      setTimeout(() => {
        inputs.forEach(inp => inp.classList.remove('error'));
        errorEl.textContent = '';
        inputs[0].focus();
      }, 800);
    }
  }

  updateUI(TOTAL);
</script>
</body>
</html>
